name: Test Run

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:
    inputs:
      scrapers:
        description: 'Scrapers to run (comma-separated list, e.g. "amazon,flipkart", or "all")'
        required: false
        default: 'all'
      once:
        description: 'Run once and exit (no scheduler)'
        required: false
        type: boolean
        default: false
      no_sync:
        description: 'Disable active-standby runner coordination'
        required: false
        type: boolean
        default: false
      auto_checkout_only:
        description: 'Run only the Telegram deal monitor + auto-checkout pipeline (no scrapers)'
        required: false
        type: boolean
        default: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run test runner
        env:
          AES_SECRET_KEY: ${{ secrets.AES_SECRET_KEY }}
          MONGO_DB_URL: ${{ secrets.MONGO_DB_URL }}
        run: |
          ARGS=""
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # Parse scrapers
            if [ "${{ inputs.scrapers }}" = "all" ] || [ -z "${{ inputs.scrapers }}" ]; then
              ARGS="$ARGS --all"
            else
              ARGS="$ARGS --run ${{ inputs.scrapers }}"
            fi
            
            # Parse once flag
            if [ "${{ inputs.once }}" = "true" ]; then
              ARGS="$ARGS --once"
            fi
            
            # Parse no-sync flag
            if [ "${{ inputs.no_sync }}" = "true" ]; then
              ARGS="$ARGS --no-sync"
            fi

            # Parse auto-checkout-only flag
            if [ "${{ inputs.auto_checkout_only }}" = "true" ]; then
              ARGS="$ARGS --auto-checkout-only"
            fi
            
            # If not running once, apply scheduler runtime
            if [ "${{ inputs.once }}" != "true" ]; then
              ARGS="$ARGS --runtime 5h55m"
            fi
          else
            # Default scheduled trigger parameters
            ARGS="--all --runtime 5h55m"
          fi
          
          echo "Executing: python runner.py $ARGS"
          python runner.py $ARGS

