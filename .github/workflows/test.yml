name: Test Run

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run test runner
        env:
          AES_SECRET_KEY: ${{ secrets.AES_SECRET_KEY }}
          MONGO_DB_URL: ${{ secrets.MONGO_DB_URL }}
        run: |
          python runner.py --all --runtime 5h55m
